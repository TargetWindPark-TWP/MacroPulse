name: MacroPulse Economic Tracker

on:
  schedule:
    # ── 每日 (工作日) ─ 台灣時間 06:30 (UTC 22:30 前一天) ──────────────────
    # 抓取：殖利率、CNN Fear & Greed、DXY、VIX 等每日更新指標
    - cron: '30 22 * * 1-5'

    # ── 每週四 20:30 台灣時間 (UTC 12:30) ────────────────────────────────────
    # 抓取：初次/續領失業救濟金（美東 8:30 公布後）
    - cron: '30 12 * * 4'

    # ── 每月智慧排程：月初、月中、月末各觸發一次 ────────────────────────────
    # run.py 內部會判斷今日是否有新數據可抓
    - cron: '0 13 1-3   * *'   # 月初：NFP, ISM PMI
    - cron: '0 13 10-16 * *'   # 月中：CPI, PPI, 零售銷售
    - cron: '0 13 20-31 * *'   # 月末：PCE, 個人收支, UMich, CB-CCI, GDP(季末)

  workflow_dispatch:           # 手動觸發
    inputs:
      mode:
        description: 'fetch-all | daily | weekly | monthly | quarterly'
        required: false
        default: 'fetch-all'
      force:
        description: '強制重新抓取（忽略快取）'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

jobs:
  track:
    name: Fetch & Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          FORCE="${{ github.event.inputs.force }}"
          # 自動判斷排程模式（若非手動觸發）
          if [ -z "$MODE" ]; then
            python scripts/determine_mode.py
          else
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "force=$FORCE" >> $GITHUB_OUTPUT
          fi

      - name: Fetch economic data
        env:
          FRED_API_KEY:  ${{ secrets.FRED_API_KEY }}
          RUN_MODE:      ${{ steps.mode.outputs.mode }}
          FORCE_REFRESH: ${{ steps.mode.outputs.force }}
        run: python scripts/run.py --mode "$RUN_MODE" ${{ steps.mode.outputs.force == 'true' && '--force' || '' }}

      - name: Commit updated data & reports
        run: |
          git config user.name  "MacroPulse Bot"
          git config user.email "macropulse@github-actions"
          git add data/ reports/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "📊 [auto] Economic data update — $TIMESTAMP"
            git push
          fi

      - name: Create alert issue (if triggered)
        if: hashFiles('reports/.alerts') != ''
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "⚠️ MacroPulse 總經警示"
          content-filepath: reports/.alerts
          labels: alert, economics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
